<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>

    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />

    <style>
      body {
        background: #f5f5f5;
      }

      .login-container {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-box {
        width: 400px;
        padding: 40px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.1);
      }

      .login-title {
        text-align: center;
        margin-bottom: 30px;
        font-weight: 700;
        color: #d10024;
      }

      .input {
        margin-bottom: 15px;
        border-radius: 6px;
      }

      .primary-btn {
        width: 100%;
        margin-top: 10px;
        border-radius: 30px;
      }

      .login-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
      }

      .login-footer a {
        color: #d10024;
        font-weight: 500;
      }

      .logo {
        text-align: center;
        margin-bottom: 20px;
      }

      .logo img {
        width: 120px;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <div class="login-box">
        <div class="logo">
          <img src="img/logo1.png" alt="" />
        </div>

        <h3 class="login-title">Đăng nhập</h3>

        <form id="loginForm">
          <input
            type="text"
            id="username"
            class="input"
            placeholder="Username"
            required
          />

          <input
            type="password"
            id="password"
            class="input"
            placeholder="Password"
            required
          />

          <div style="margin: 10px 0; display: flex; align-items: center">
            <input type="checkbox" id="remember" style="margin-right: 8px" />
            <label for="remember">Remember me</label>
          </div>

          <button class="primary-btn">Đăng nhập</button>
        </form>

        <div class="login-footer">
          <a href="#" style="font-size:13px;">Quên mật khẩu?</a> <br/>
          Chưa có tài khoản? <a href="#">Đăng ký</a>
        </div>
      </div>
    </div>

    <!-- giữ nguyên logic cũ -->
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;

          if (username === "admin") {
            localStorage.setItem("role", "Admin");
            window.location.href = "http://localhost:3000";
          } else {
            localStorage.setItem("role", "User");
            window.location.href = "index.html";
          }
        });
    </script>
  </body>
</html>
