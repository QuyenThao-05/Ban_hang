<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giỏ hàng - Stationery Shop</title>

    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700"
      rel="stylesheet"
    />
    <link type="text/css" rel="stylesheet" href="css/bootstrap.min.css" />
    <link type="text/css" rel="stylesheet" href="css/slick.css" />
    <link type="text/css" rel="stylesheet" href="css/slick-theme.css" />
    <link type="text/css" rel="stylesheet" href="css/nouislider.min.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" />
    <link type="text/css" rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Load Header chung -->
    <script>
      fetch("header.html")
        .then((res) => res.text())
        .then((data) => {
          const temp = document.createElement("div");
          temp.innerHTML = data;
          document.body.insertBefore(
            temp.querySelector("header"),
            document.body.firstChild,
          );

          setTimeout(() => {
            updateUserHeader();
            updateCartCount();
            loadCartDropdown();
          }, 500);
        });
    </script>

    <!-- BREADCRUMB -->
    <div id="breadcrumb" class="section">
      <div class="container">
        <div class="row">
          <div class="col-md-12">
            <ul class="breadcrumb-tree">
              <li><a href="index.html">Trang chủ</a></li>
              <li class="active">Giỏ hàng</li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- SECTION -->
    <div class="section">
      <div class="container">
        <div class="row">
          <div class="col-md-12">
            <div class="section-title">
              <h3 class="title">Giỏ hàng của bạn</h3>
            </div>
          </div>

          <!-- Cart Table -->
          <div class="col-md-8">
            <div class="cart-table">
              <table class="table table-bordered">
                <thead>
                  <tr>
                    <th style="width: 100px">Ảnh</th>
                    <th>Sản phẩm</th>
                    <th>Giá</th>
                    <th>Số lượng</th>
                    <th>Tổng</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="cart-body"></tbody>
              </table>
            </div>
          </div>

          <!-- Order Summary -->
          <div class="col-md-4">
            <div class="order-summary">
              <div class="section-title">
                <h4 class="title">Tóm tắt đơn hàng</h4>
              </div>
              <div class="order-col">
                <div><strong>Tổng cộng</strong></div>
                <div><strong id="cart-subtotal">0 VND</strong></div>
              </div>
              <div class="order-col">
                <div>Phí vận chuyển</div>
                <div><strong>Miễn phí</strong></div>
              </div>
              <hr />
              <div class="order-col">
                <div><strong>Tổng thanh toán</strong></div>
                <div>
                  <strong
                    id="cart-total"
                    style="color: #d10024; font-size: 20px"
                    >0 VND</strong
                  >
                </div>
              </div>

              <a
                href="checkout.html"
                class="primary-btn order-submit"
                style="width: 100%; margin-top: 20px; padding: 12px"
              >
                Tiến hành thanh toán
              </a>
              <a
                href="index.html"
                class="btn btn-default"
                style="width: 100%; margin-top: 10px"
              >
                <i class="fa fa-arrow-left"></i> Tiếp tục mua sắm
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Script xử lý giỏ hàng -->
    <script>
      function loadCart() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const tbody = document.getElementById("cart-body");
        tbody.innerHTML = "";

        let subtotal = 0;

        if (cart.length === 0) {
          tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center" style="padding:40px;">
                            <h4>Giỏ hàng trống</h4>
                            <a href="index.html" class="primary-btn">Mua sắm ngay</a>
                        </td>
                    </tr>`;
          updateTotal(0);
          return;
        }

        cart.forEach((item, index) => {
          const itemTotal = item.price * item.quantity;
          subtotal += itemTotal;

          tbody.innerHTML += `
                    <tr>
                        <td><img src="${item.image}" width="70" alt=""></td>
                        <td><strong>${item.name}</strong></td>
                        <td>${item.price.toLocaleString()} VND</td>
                        <td>
                            <div class="input-number">
                                <button onclick="changeQty(${index}, -1)" class="qty-down">-</button>
                                <input type="text" value="${item.quantity}" readonly>
                                <button onclick="changeQty(${index}, 1)" class="qty-up">+</button>
                            </div>
                        </td>
                        <td><strong>${itemTotal.toLocaleString()} VND</strong></td>
                        <td>
                            <button onclick="removeItem(${index})" class="btn btn-danger btn-sm">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>`;
        });

        updateTotal(subtotal);
      }

      function updateTotal(subtotal) {
        document.getElementById("cart-subtotal").innerText =
          subtotal.toLocaleString() + " VND";
        document.getElementById("cart-total").innerText =
          subtotal.toLocaleString() + " VND";
      }

      function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
        updateCartCount();
      }

      function changeQty(index, delta) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart[index].quantity += delta;
        if (cart[index].quantity < 1) cart[index].quantity = 1;
        localStorage.setItem("cart", JSON.stringify(cart));
        loadCart();
        updateCartCount();
      }

      // Khởi chạy
      document.addEventListener("DOMContentLoaded", loadCart);
    </script>

    <!-- User & Cart functions -->
    <script>
      function updateUserHeader() {
        const user = JSON.parse(localStorage.getItem("user"));
        const accountArea = document.getElementById("account-area");
        if (user && user.username) {
          accountArea.innerHTML = `
                    <a href="#" style="margin-right:12px;color:white">
                        <i class="fa fa-user"></i> ${user.username}
                    </a>
                    <a href="#" id="logout-btn" style="color:white">
                        <i class="fa fa-sign-out"></i> Logout
                    </a>`;
          document.getElementById("logout-btn").onclick = () => {
            localStorage.clear();
            window.location.href = "index.html";
          };
        }
      }

      function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        const el = document.getElementById("cart-count");
        if (el) el.innerText = count;
      }
    </script>
    <script>
      // Load Footer
      fetch("footer.html")
        .then((response) => response.text())
        .then((data) => {
          const temp = document.createElement("div");
          temp.innerHTML = data;
          document.body.appendChild(temp.querySelector("footer"));
        })
        .catch((err) => console.error("Load footer thất bại:", err));
    </script>
  </body>
</html>
