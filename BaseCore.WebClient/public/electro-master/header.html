<!doctype html>
<html lang="vi">
  <head>
    <!-- Các link CSS chung -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stationery Shop</title>

    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700"
      rel="stylesheet"
    />
    <link type="text/css" rel="stylesheet" href="css/bootstrap.min.css" />
    <link type="text/css" rel="stylesheet" href="css/slick.css" />
    <link type="text/css" rel="stylesheet" href="css/slick-theme.css" />
    <link type="text/css" rel="stylesheet" href="css/nouislider.min.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" />
    <link type="text/css" rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header
      style="position: sticky; top: 0; z-index: 1000; background: #15161d"
    >
      <!-- TOP HEADER -->
      <div id="top-header">
        <div class="container">
          <ul class="header-links pull-left">
            <li>
              <a href="#"><i class="fa fa-phone"></i> +021-95-51-84</a>
            </li>
            <li>
              <a href="#"><i class="fa fa-envelope-o"></i> email@email.com</a>
            </li>
            <li>
              <a href="#"
                ><i class="fa fa-map-marker"></i> 1734 Stonecoal Road</a
              >
            </li>
          </ul>
          <ul class="header-links pull-right">
            <!-- Thông báo -->
            <li>
              <a href="#" style="position: relative">
                <i class="fa fa-bell"></i>
                <span style="display: inline-block; margin-left: 5px"
                  >Thông báo</span
                >
              </a>
            </li>

            <!-- Hỗ trợ -->
            <li class="support-dropdown">
              <a href="#">
                <i class="fa fa-question-circle"></i>
                Hỗ trợ
              </a>

              <div class="support-menu">
                <a href="tel:19001234">
                  <i class="fa fa-phone"></i>
                  Hotline: 1900 1234
                </a>

                <a href="mailto:support@stationeryshop.com">
                  <i class="fa fa-envelope"></i>
                  Email hỗ trợ
                </a>

                <a href="contact.html">
                  <i class="fa fa-comments"></i>
                  Liên hệ
                </a>

                <a href="#">
                  <i class="fa fa-question-circle"></i>
                  Câu hỏi thường gặp
                </a>
              </div>
            </li>
            <!-- Hỗ trợ -->

            <li id="account-area"></li>
          </ul>
        </div>
      </div>

      <!-- MAIN HEADER -->
      <div id="header" style="padding: 16px 0">
        <div class="container">
          <div class="row align-items-center">
            <!-- LOGO -->
            <div class="col-md-3">
              <div class="header-logo">
                <a href="index.html" class="logo">
                  <img
                    src="./img/logo2.png"
                    alt="Stationery Shop"
                    style="max-height: 68px; width: auto; object-fit: contain"
                  />
                </a>
              </div>
            </div>

            <!-- SEARCH -->
            <div class="col-md-6">
              <div class="header-search">
                <form
                  id="search-form"
                  onsubmit="
                    handleSearch();
                    return false;
                  "
                  style="display: flex"
                >
                  <input
                    id="searchInput"
                    class="input"
                    placeholder="Tìm sản phẩm..."
                    style="flex: 1; border-radius: 40px 0 0 40px"
                  />

                  <button
                    type="submit"
                    class="search-btn"
                    style="width: 140px; border-radius: 0 40px 40px 0"
                  >
                    Tìm kiếm
                  </button>
                </form>
              </div>
            </div>

            <!-- RIGHT -->
            <div class="col-md-3">
              <div class="header-ctn">
                <!-- Wishlist -->
                <div>
                  <a href="wishlist.html">
                    <i class="fa fa-heart-o"></i>
                    <span>Yêu thích</span>
                    <div class="qty" id="wishlist-count">0</div>
                  </a>
                </div>

                <!-- Cart -->
                <div class="dropdown">
                  <a class="dropdown-toggle" data-toggle="dropdown">
                    <i class="fa fa-shopping-cart"></i>
                    <span>Giỏ hàng</span>
                    <div class="qty" id="cart-count">0</div>
                  </a>

                  <div class="cart-dropdown">
                    <div class="cart-list" id="cart-list"></div>

                    <div class="cart-summary">
                      <h5 id="cart-total">0 VND</h5>
                    </div>

                    <div class="cart-btns">
                      <a href="cart.html">Xem giỏ hàng</a>
                      <a href="checkout.html">Thanh toán</a>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- /MAIN HEADER -->
      <!-- NAVIGATION -->
      <nav id="navigation">
        <!-- container -->
        <div class="container">
          <!-- responsive-nav -->
          <div id="responsive-nav"></div>
          <!-- /responsive-nav -->
        </div>
        <!-- /container -->
      </nav>
      <!-- /NAVIGATION -->
    </header>
    <!-- /HEADER -->

    <script>
      // Hàm tìm kiếm chung
      function handleSearch() {
        const keyword = document.getElementById("searchInput").value.trim();
        if (!keyword) return;

        // Nếu đang ở index.html thì search trực tiếp
        if (
          window.location.pathname.includes("index.html") ||
          window.location.pathname === "/" ||
          window.location.pathname.endsWith("/")
        ) {
          if (typeof loadProducts === "function") {
            loadProducts(keyword);
          }
        } else {
          // Chuyển sang index.html và search
          window.location.href = `index.html?search=${encodeURIComponent(keyword)}`;
        }
      }

      // Load user sau khi header được chèn
      document.addEventListener("DOMContentLoaded", function () {
        updateUserHeader();
        updateCartCount();
        loadCartDropdown();
      });
    </script>

    <script>
      function getCartKey() {
        const user = JSON.parse(localStorage.getItem("user"));

        if (!user) {
          return "cart_guest";
        }

        return `cart_${user.username}`;
      }
      function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem(getCartKey())) || [];

        let totalQty = 0;

        cart.forEach((item) => {
          totalQty += item.quantity || 1;
        });

        const cartCount = document.getElementById("cart-count");

        if (cartCount) {
          cartCount.innerText = totalQty;
        }
      }

      function updateWishlistCount() {
        const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

        const wishlistCount = document.getElementById("wishlist-count");

        if (wishlistCount) {
          wishlistCount.innerText = wishlist.length;
        }
      }

      function loadCartDropdown() {
        const cart = JSON.parse(localStorage.getItem(getCartKey())) || [];

        const cartList = document.getElementById("cart-list");

        const cartTotal = document.getElementById("cart-total");

        if (!cartList) return;

        if (cart.length === 0) {
          cartList.innerHTML = "<p>Giỏ hàng trống</p>";

          if (cartTotal) {
            cartTotal.innerText = "0 VND";
          }

          return;
        }

        let total = 0;

        cartList.innerHTML = cart
          .map((item) => {
            total += item.price * item.quantity;

            return `
            <div class="product-widget">
                <div class="product-img">
                    <img src="${item.image}" alt="">
                </div>

                <div class="product-body">
                    <h3 class="product-name">
                        ${item.name}
                    </h3>

                    <h4 class="product-price">
                        ${item.quantity} x
                        ${item.price.toLocaleString("vi-VN")}đ
                    </h4>
                </div>
            </div>
        `;
          })
          .join("");

        if (cartTotal) {
          cartTotal.innerText = total.toLocaleString("vi-VN") + " VND";
        }
      }
    </script>
    <script>
      function updateUserHeader() {
        const accountArea = document.getElementById("account-area");

        const user = JSON.parse(localStorage.getItem("user"));

        // Chưa đăng nhập
        if (!user) {
          accountArea.innerHTML = `
        <a href="http://localhost:3000/login">
          <i class="fa fa-user-o"></i>
          Đăng nhập
        </a>
      `;
          return;
        }

        // Đã đăng nhập
        accountArea.innerHTML = `
      <div class="account-dropdown">
        <a href="#">
          <i class="fa fa-user-o"></i>
          ${user.username}
        </a>

        <div class="account-menu">
          <a href="profile.html">
            <i class="fa fa-user"></i>
            Thông tin tài khoản
          </a>

          <a href="orders.html">
            <i class="fa fa-shopping-bag"></i>
            Đơn mua
          </a>

          <a href="#" onclick="logout()">
            <i class="fa fa-sign-out"></i>
            Đăng xuất
          </a>
        </div>
      </div>
    `;
      }

      function logout() {
        localStorage.removeItem("user");
        window.location.href = "index.html";
      }
    </script>
  </body>
</html>
