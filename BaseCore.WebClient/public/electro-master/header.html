<!doctype html>
<html lang="vi">
  <head>
    <!-- Các link CSS chung -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stationery Shop</title>

    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700"
      rel="stylesheet"
    />
    <link type="text/css" rel="stylesheet" href="css/bootstrap.min.css" />
    <link type="text/css" rel="stylesheet" href="css/slick.css" />
    <link type="text/css" rel="stylesheet" href="css/slick-theme.css" />
    <link type="text/css" rel="stylesheet" href="css/nouislider.min.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" />
    <link type="text/css" rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header
      style="position: sticky; top: 0; z-index: 1000; background: #15161d"
    >
      <!-- TOP HEADER -->
      <div id="top-header">
        <div class="container">
          <ul class="header-links pull-left">
            <li>
              <a href="#"><i class="fa fa-phone"></i> +021-95-51-84</a>
            </li>
            <li>
              <a href="#"><i class="fa fa-envelope-o"></i> email@email.com</a>
            </li>
            <li>
              <a href="#"
                ><i class="fa fa-map-marker"></i> 1734 Stonecoal Road</a
              >
            </li>
          </ul>
          <ul class="header-links pull-right">
            <!-- Thông báo -->
            <li>
              <a href="#" style="position: relative">
                <i class="fa fa-bell"></i>
                <span style="display: inline-block; margin-left: 5px"
                  >Thông báo</span
                >
              </a>
            </li>

            <!-- Hỗ trợ -->
            <li>
              <a href="#"><i class="fa fa-question-circle"></i> Hỗ trợ</a>
            </li>
            <li id="account-area"></li>
          </ul>
        </div>
      </div>

      <!-- MAIN HEADER -->
      <div id="header" style="padding: 16px 0">
        <div class="container">
          <div class="row align-items-center">
            <!-- LOGO -->
            <div class="col-md-2">
              <div class="header-logo">
                <a href="index.html" class="logo">
                  <img
                    src="./img/logo2.png"
                    alt="Stationery Shop"
                    style="max-height: 68px"
                  />
                </a>
              </div>
            </div>

            <!-- SEARCH BAR -->
            <div class="col-md-9 d-flex justify-content-center">
              <div class="header-search w-100">
                <form
                  id="search-form"
                  onsubmit="
                    handleSearch();
                    return false;
                  "
                  class="d-flex"
                >
                  <input
                    id="searchInput"
                    class="input flex-grow-1"
                    placeholder="Tìm sản phẩm..."
                  />
                  <button type="submit" class="search-btn">Search</button>
                </form>
              </div>
            </div>

            <!-- CART -->
            <div class="col-md-1">
              <div
                class="header-ctn d-flex justify-content-end align-items-center"
              >
                <div class="dropdown text-center">
                  <a class="dropdown-toggle" data-toggle="dropdown">
                    <i class="fa fa-shopping-cart" style="font-size: 22px"></i>
                    <span style="display: block; font-size: 13px"
                      >Giỏ hàng</span
                    >
                    <div class="qty" id="cart-count">0</div>
                  </a>
                  <div class="cart-dropdown">
                    <div class="cart-list" id="cart-list"></div>
                    <div class="cart-summary">
                      <h5 id="cart-total">0 VND</h5>
                    </div>
                    <div class="cart-btns">
                      <a href="cart.html">Xem giỏ hàng</a>
                      <a href="checkout.html">Thanh toán</a>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- /MAIN HEADER -->
      <!-- NAVIGATION -->
      <nav id="navigation">
        <!-- container -->
        <div class="container">
          <!-- responsive-nav -->
          <div id="responsive-nav"></div>
          <!-- /responsive-nav -->
        </div>
        <!-- /container -->
      </nav>
      <!-- /NAVIGATION -->
    </header>
    <!-- /HEADER -->

    <script>
      // Hàm tìm kiếm chung
      function handleSearch() {
        const keyword = document.getElementById("searchInput").value.trim();
        if (!keyword) return;

        // Nếu đang ở index.html thì search trực tiếp
        if (
          window.location.pathname.includes("index.html") ||
          window.location.pathname === "/" ||
          window.location.pathname.endsWith("/")
        ) {
          if (typeof loadProducts === "function") {
            loadProducts(keyword);
          }
        } else {
          // Chuyển sang index.html và search
          window.location.href = `index.html?search=${encodeURIComponent(keyword)}`;
        }
      }

      // Load user sau khi header được chèn
      document.addEventListener("DOMContentLoaded", function () {
        updateUserHeader();
        updateCartCount();
        loadCartDropdown();
      });
    </script>
  </body>
</html>
