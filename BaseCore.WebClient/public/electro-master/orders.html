<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đơn mua - Stationery Shop</title>

    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700"
      rel="stylesheet"
    />
    <link type="text/css" rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" />
    <link type="text/css" rel="stylesheet" href="css/style.css" />

    <style>
      .order-tab {
        border-bottom: 3px solid #d10024;
        font-weight: 600;
      }
      .tab-active {
        color: #d10024 !important;
        border-bottom: 3px solid #d10024;
      }
      .order-item {
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 18px;
        margin-bottom: 20px;
        background: #fff;
      }
      .order-status {
        font-weight: bold;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- BREADCRUMB -->
    <div id="breadcrumb" class="section">
      <!-- container -->
      <div class="container">
        <!-- row -->
        <div class="row">
          <div class="col-md-12">
            <ul class="breadcrumb-tree">
              <li><a href="profile.html">Tài khoản của tôi</a></li>
              <li class="active">Đơn mua</li>
            </ul>
          </div>
        </div>
        <!-- /row -->
      </div>
      <!-- /container -->
    </div>
    <!-- /BREADCRUMB -->

    <!-- MAIN CONTENT -->
    <div class="section">
      <div class="container">
        <!-- Tabs giống Shopee -->
        <ul class="nav nav-tabs order-tab" style="margin-bottom: 30px">
          <li class="active">
            <a href="#" onclick="filterOrders('all')"> Tất cả </a>
          </li>

          <li>
            <a href="#" onclick="filterOrders('Pending')"> Chờ xác nhận </a>
          </li>

          <li>
            <a href="#" onclick="filterOrders('Confirmed')"> Đã xác nhận </a>
          </li>

          <li>
            <a href="#" onclick="filterOrders('Packing')"> Đóng gói </a>
          </li>

          <li>
            <a href="#" onclick="filterOrders('Shipping')"> Đang giao hàng </a>
          </li>

          <li>
            <a href="#" onclick="filterOrders('Completed')"> Hoàn thành </a>
          </li>

          <li>
            <a href="#" onclick="filterOrders('Cancelled')"> Đã hủy </a>
          </li>

          <li>
            <a href="#" onclick="filterOrders('Returned')"> Trả hàng </a>
          </li>
        </ul>

        <div class="tab-content">
          <div id="tab-all" class="tab-pane fade in active">
            <div id="order-list">
              <!-- JavaScript sẽ render đơn hàng vào đây -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>

    <script>
      fetch("header.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("header-placeholder").innerHTML = data;

          // chạy script trong header
          const scripts = document
            .getElementById("header-placeholder")
            .querySelectorAll("script");

          scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");

            if (oldScript.src) {
              newScript.src = oldScript.src;
            } else {
              newScript.textContent = oldScript.textContent;
            }

            document.body.appendChild(newScript);
          });

          // update lại cart + wishlist
          if (typeof updateCartCount === "function") {
            updateCartCount();
          }

          if (typeof loadCartDropdown === "function") {
            loadCartDropdown();
          }

          if (typeof updateWishlistCount === "function") {
            updateWishlistCount();
          }
        });
    </script>

    <script>
      // Nhúng Header và Footer
      fetch("footer.html")
        .then((res) => res.text())
        .then(
          (data) =>
            (document.getElementById("footer-placeholder").innerHTML = data),
        );

      let allOrders = [];

      async function loadOrders() {
        try {
          // nếu có token đăng nhập
          const token = localStorage.getItem("token");

          const response = await fetch("http://localhost:5001/api/order", {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
          });

          if (!response.ok) {
            throw new Error("Không thể tải đơn hàng");
          }

          const result = await response.json();

          const userId = localStorage.getItem("userId");

          allOrders = result.items.filter((o) => o.userId == userId);

          console.log(allOrders);

          renderOrders(allOrders);
        } catch (error) {
          console.error(error);

          document.getElementById("order-list").innerHTML = `
        <div class="alert alert-danger">
          Không tải được đơn hàng
        </div>
      `;
        }
      }

      function renderOrders(orders) {
        const container = document.getElementById("order-list");

        if (!orders || orders.length === 0) {
          container.innerHTML = `
      <div class="text-center" style="padding:40px">
        <h4>Chưa có đơn hàng</h4>
      </div>
    `;
          return;
        }

        container.innerHTML = orders
          .map(
            (o) => `
    
    <div class="order-item">

      <div class="order-header">
        <div>
          <strong>Đơn hàng #${o.id}</strong>
        </div>
        <div>
          ${getStatusText(o.status)}
        </div>
      </div>

      ${(o.orderDetails || [])
        .map(
          (item) => `

        <div class="order-product">

          <img
            src="${item.productImage}"
            alt="${item.productName}"
            class="order-product-image"
          >

          <div class="order-product-info">

            <div class="product-name">
              ${item.productName}
            </div>

            <div class="product-variant">
              ${item.color || ""} ${item.size || ""}
            </div>

            <div class="product-qty">
              x${item.quantity}
            </div>

          </div>

          <div class="product-price">
            ${Number(item.price).toLocaleString("vi-VN")} đ
          </div>

        </div>

      `,
        )
        .join("")}

      <div class="order-footer">

        <strong>
          Thành tiền:
          ${Number(o.finalAmount).toLocaleString("vi-VN")} đ
        </strong>

         ${renderOrderActions(o)}

      </div>

    </div>

  `,
          )
          .join("");
      }

      function filterOrders(status) {
        if (status === "all") {
          renderOrders(allOrders);
          return;
        }

        const filtered = allOrders.filter((x) => x.status === status);

        renderOrders(filtered);
      }

      function getStatusColor(status) {
        switch (status) {
          case "Hoàn thành":
            return "#28a745";

          case "Chờ giao hàng":
            return "#d10024";

          case "Đã hủy":
            return "#6c757d";

          case "Vận chuyển":
            return "#007bff";

          default:
            return "#ff9900";
        }
      }

      function getStatusText(status) {
        switch (status) {
          case "Pending":
            return `
        <span style="color:#ff9900;font-weight:600">
          CHỜ XÁC NHẬN
        </span>
      `;

          case "Confirmed":
            return `
        <span style="color:#17a2b8;font-weight:600">
          ĐÃ XÁC NHẬN
        </span>
      `;

          case "Packing":
            return `
        <span style="color:#6f42c1;font-weight:600">
          ĐANG ĐÓNG GÓI
        </span>
      `;

          case "Shipping":
            return `
        <span style="color:#007bff;font-weight:600">
          ĐANG GIAO HÀNG
        </span>
      `;

          case "Completed":
            return `
        <span style="color:#26aa99;font-weight:600">
          GIAO HÀNG THÀNH CÔNG
        </span>

        <span style="
          margin-left:12px;
          color:#d10024;
          font-weight:600;
        ">
          HOÀN THÀNH
        </span>
      `;

          case "Cancelled":
            return `
        <span style="color:#d10024;font-weight:600">
          ĐÃ HỦY
        </span>
      `;

          case "Returned":
            return `
        <span style="color:#dc3545;font-weight:600">
          TRẢ HÀNG / HOÀN TIỀN
        </span>
      `;

          default:
            return status;
        }
      }

      function renderOrderActions(order) {
        if (order.status === "Completed") {
          return `
      <button
        class="btn btn-danger"
        onclick="reviewOrder(${order.id})"
      >
        Đánh giá
      </button>

      <button
        class="btn btn-default"
        onclick="buyAgain(${order.id})"
      >
        Mua lại
      </button>
    `;
        }

        if (order.status === "Cancelled") {
          return `
      <button
        class="btn btn-default"
        onclick="viewCancelReason(${order.id})"
      >
        Xem chi tiết hủy đơn
      </button>

      <button
        class="btn btn-danger"
        onclick="buyAgain(${order.id})"
      >
        Mua lại
      </button>
    `;
        }

        return "";
      }

      function reviewOrder(id) {
        alert("Đánh giá đơn #" + id);
      }

      function buyAgain(id) {
        alert("Mua lại đơn #" + id);
      }

      function viewCancelReason(id) {
        alert("Xem lý do hủy đơn #" + id);
      }

      // load dữ liệu khi mở trang
      window.onload = loadOrders;
    </script>
  </body>
</html>
