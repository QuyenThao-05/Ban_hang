<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đơn mua - Stationery Shop</title>

    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700"
      rel="stylesheet"
    />
    <link type="text/css" rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" />
    <link type="text/css" rel="stylesheet" href="css/style.css" />

    <style>
      .order-tab {
        border-bottom: 3px solid #d10024;
        font-weight: 600;
      }
      .tab-active {
        color: #d10024 !important;
        border-bottom: 3px solid #d10024;
      }
      .order-item {
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 18px;
        margin-bottom: 20px;
        background: #fff;
      }
      .order-status {
        font-weight: bold;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- BREADCRUMB -->
    <div id="breadcrumb" class="section">
      <!-- container -->
      <div class="container">
        <!-- row -->
        <div class="row">
          <div class="col-md-12">
            <ul class="breadcrumb-tree">
              <li><a href="profile.html">Tài khoản của tôi</a></li>
              <li class="active">Đơn mua</li>
            </ul>
          </div>
        </div>
        <!-- /row -->
      </div>
      <!-- /container -->
    </div>
    <!-- /BREADCRUMB -->

    <!-- MAIN CONTENT -->
    <div class="section">
      <div class="container">
        <!-- Tabs giống Shopee -->
        <ul class="nav nav-tabs order-tab" style="margin-bottom: 30px">
          <li class="active">
            <a data-toggle="tab" href="#tab-all" class="tab-active">Tất cả</a>
          </li>
          <li><a data-toggle="tab" href="#tab-waitpay">Chờ thanh toán</a></li>
          <li><a data-toggle="tab" href="#tab-shipping">Vận chuyển</a></li>
          <li><a data-toggle="tab" href="#tab-delivering">Chờ giao hàng</a></li>
          <li><a data-toggle="tab" href="#tab-done">Hoàn thành</a></li>
          <li><a data-toggle="tab" href="#tab-cancel">Đã hủy</a></li>
        </ul>

        <div class="tab-content">
          <div id="tab-all" class="tab-pane fade in active">
            <div id="order-list">
              <!-- JavaScript sẽ render đơn hàng vào đây -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>

    <script>
      fetch("header.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("header-placeholder").innerHTML = data;

          // chạy script trong header
          const scripts = document
            .getElementById("header-placeholder")
            .querySelectorAll("script");

          scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");

            if (oldScript.src) {
              newScript.src = oldScript.src;
            } else {
              newScript.textContent = oldScript.textContent;
            }

            document.body.appendChild(newScript);
          });

          // update lại cart + wishlist
          if (typeof updateCartCount === "function") {
            updateCartCount();
          }

          if (typeof loadCartDropdown === "function") {
            loadCartDropdown();
          }

          if (typeof updateWishlistCount === "function") {
            updateWishlistCount();
          }
        });
    </script>

    <script>
      // Nhúng Header và Footer
      fetch("footer.html")
        .then((res) => res.text())
        .then(
          (data) =>
            (document.getElementById("footer-placeholder").innerHTML = data),
        );

      async function loadOrders() {
        try {
          // nếu có token đăng nhập
          const token = localStorage.getItem("token");

          const response = await fetch("http://localhost:5001/api/order", {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
          });

          if (!response.ok) {
            throw new Error("Không thể tải đơn hàng");
          }

          const result = await response.json();

          const userId = localStorage.getItem("userId");

          const orders = result.items.filter(
            o => o.userId == userId
          );

          renderOrders(orders);
        } catch (error) {
          console.error(error);

          document.getElementById("order-list").innerHTML = `
        <div class="alert alert-danger">
          Không tải được đơn hàng
        </div>
      `;
        }
      }

      function renderOrders(orders) {
        const container = document.getElementById("order-list");

        if (!orders || orders.length === 0) {
          container.innerHTML = `
        <div class="text-center" style="padding:40px">
          <h4>Chưa có đơn hàng</h4>
        </div>
      `;
          return;
        }

        container.innerHTML = orders
          .map(
            (o) => `
  <div class="order-item">

    <div class="row">

      <div class="col-md-9">

        <h4>Đơn hàng #${o.id}</h4>

        <p>
          Người nhận:
          <strong>${o.customerName}</strong>
        </p>

        <p>
          SĐT:
          <strong>${o.customerPhone}</strong>
        </p>

        <p>
          Địa chỉ:
          <strong>${o.shippingAddress}</strong>
        </p>

        <p>
          Thanh toán:
          <strong>${o.paymentMethod}</strong>
        </p>

      </div>

      <div class="col-md-3 text-right">

        <span 
          class="order-status"
          style="
            background:${getStatusColor(o.status)}20;
            color:${getStatusColor(o.status)}
          "
        >
          ${o.status}
        </span>

        <h4 style="margin-top:15px">
          ${Number(o.finalAmount).toLocaleString("vi-VN")} đ
        </h4>

      </div>

    </div>

  </div>
`,
          )
          .join("");
      }

      function getStatusColor(status) {
        switch (status) {
          case "Hoàn thành":
            return "#28a745";

          case "Chờ giao hàng":
            return "#d10024";

          case "Đã hủy":
            return "#6c757d";

          case "Vận chuyển":
            return "#007bff";

          default:
            return "#ff9900";
        }
      }

      // load dữ liệu khi mở trang
      window.onload = loadOrders;
    </script>
  </body>
</html>
